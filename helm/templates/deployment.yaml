apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Values.label }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.label }}
  template:
    metadata:
      name: {{ .Chart.Name }}
      labels:
        app: {{ .Values.label }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: {{ .Values.ingress.path }}/health
              port: 8000
            initialDelaySeconds: {{ .Values.livenessProbe.delay }}
            periodSeconds: {{ .Values.livenessProbe.period }}
          env:
            - name: TZ
              value: "{{ .Values.environment.timezone }}"
            - name: PIXOO_HOST
              value: "{{ .Values.environment.pixoo_host }}"
            - name: PIXOO_SCREEN_SIZE
              value: "{{ .Values.environment.pixoo_screen_size }}"
            - name: PIXOO_DEBUG
              value: "{{ .Values.environment.pixoo_debug }}"
            - name: PIXOO_CONNECTION_CHECK
              value: "{{ .Values.environment.pixoo_connection_check }}"
            - name: PIXOO_CONNECTION_CHECK_RETRIES
              value: "{{ .Values.environment.pixoo_connection_check_retries }}"
            - name: PIXOO_REST_DEBUG
              value: "{{ .Values.environment.pixoo_rest_debug }}"
            - name: PIXOO_REST_ROOT_PATH
              value: "{{ .Values.ingress.path }}"
      restartPolicy: {{ .Values.restartPolicy }}
